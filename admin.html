<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MY PICKS — Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: #f7f7f5; color: #111; min-height: 100vh; padding: 24px 16px 80px; }
    .header { text-align: center; padding: 32px 0 24px; border-bottom: 2px solid #111; margin-bottom: 32px; }
    .header h1 { font-family: 'Space Mono', monospace; font-size: 28px; font-weight: 700; }
    .header p { color: #777; font-size: 13px; margin-top: 6px; }

    .setup-box { background: #fff; border: 1px solid #e0e0e0; border-radius: 12px; padding: 20px; margin-bottom: 24px; }
    .setup-box h2 { font-family: 'Space Mono', monospace; font-size: 13px; margin-bottom: 12px; color: #FF6B35; }
    .token-row { display: flex; gap: 8px; }
    .token-row input { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; font-family: 'Space Mono', monospace; }
    .token-row button { padding: 10px 16px; background: #111; color: #fff; border: none; border-radius: 8px; font-size: 13px; cursor: pointer; white-space: nowrap; }

    .url-box { background: #fff; border: 2px solid #111; border-radius: 12px; padding: 20px; margin-bottom: 24px; }
    .url-box h2 { font-family: 'Space Mono', monospace; font-size: 13px; margin-bottom: 12px; }
    .url-row { display: flex; gap: 8px; }
    .url-row input { flex: 1; padding: 12px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
    .url-row button { padding: 12px 18px; background: #FF6B35; color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; white-space: nowrap; }
    .url-row button:disabled { background: #ccc; cursor: not-allowed; }
    .fetch-status { margin-top: 8px; font-size: 12px; color: #777; min-height: 18px; }

    .section-title { font-family: 'Space Mono', monospace; font-size: 13px; color: #777; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.08em; }
    .product-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
    .product-item { background: #fff; border: 1px solid #e0e0e0; border-radius: 12px; padding: 14px 16px; display: flex; align-items: center; gap: 12px; }
    .product-item img { width: 48px; height: 48px; object-fit: contain; background: #f9f9f9; border-radius: 6px; flex-shrink: 0; }
    .product-info { flex: 1; min-width: 0; }
    .product-info .title { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .product-info .meta { font-size: 11px; color: #999; margin-top: 2px; }
    .product-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .btn-edit { padding: 6px 12px; background: #fff8ee; color: #FF6B35; border: none; border-radius: 6px; font-size: 12px; cursor: pointer; font-weight: 600; }
    .btn-delete { padding: 6px 12px; background: #fff0ee; color: #e53e3e; border: none; border-radius: 6px; font-size: 12px; cursor: pointer; }

    .add-box { background: #fff; border: 1px solid #e0e0e0; border-radius: 12px; padding: 20px; margin-bottom: 24px; }
    .add-box.editing { border-color: #FF6B35; border-width: 2px; }
    .add-box h2 { font-family: 'Space Mono', monospace; font-size: 13px; margin-bottom: 16px; color: #777; }
    .add-box.editing h2 { color: #FF6B35; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .form-group { display: flex; flex-direction: column; gap: 4px; }
    .form-group.full { grid-column: 1 / -1; }
    .form-group label { font-size: 11px; color: #777; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; }
    .form-group input, .form-group textarea { padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; font-family: 'DM Sans', sans-serif; background: #fafafa; }
    .form-group textarea { resize: vertical; min-height: 60px; }
    .form-group input:focus, .form-group textarea:focus { outline: none; border-color: #FF6B35; background: #fff; }
    .preview-img { width: 80px; height: 80px; object-fit: contain; background: #f9f9f9; border-radius: 8px; border: 1px solid #eee; margin-top: 8px; }
    .btn-row { display: flex; gap: 8px; margin-top: 16px; }
    .btn-add { flex: 1; padding: 14px; background: #FF6B35; color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: 'Space Mono', monospace; }
    .btn-cancel { padding: 14px 20px; background: #f0f0ee; color: #555; border: none; border-radius: 10px; font-size: 14px; cursor: pointer; font-family: 'Space Mono', monospace; }

    .deploy-btn { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); padding: 16px 40px; background: #111; color: #fff; border: none; border-radius: 100px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: 'Space Mono', monospace; box-shadow: 0 4px 20px rgba(0,0,0,0.2); white-space: nowrap; }
    .deploy-btn:disabled { background: #999; cursor: not-allowed; }
    .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #111; color: #fff; padding: 12px 24px; border-radius: 100px; font-size: 13px; font-family: 'Space Mono', monospace; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999; white-space: nowrap; }
    .toast.show { opacity: 1; }
    .toast.error { background: #e53e3e; }
    .empty { text-align: center; padding: 32px; color: #bbb; font-size: 13px; }
    .auto-filled { background: #f0fff4 !important; border-color: #68d391 !important; }
    @media (max-width: 500px) { .form-grid { grid-template-columns: 1fr; } .form-group.full { grid-column: 1; } }
  </style>
</head>
<body>

<div class="header">
  <h1>MY PICKS</h1>
  <p>Admin — Add & manage products</p>
</div>

<div class="setup-box">
  <h2>⚙ GITHUB TOKEN</h2>
  <div class="token-row">
    <input type="password" id="tokenInput" placeholder="ghp_xxxxxxxxxxxxxxxx">
    <button onclick="saveToken()">Save</button>
  </div>
  <p style="font-size:11px;color:#999;margin-top:8px;">브라우저에만 저장 — 외부 전송 없음</p>
</div>

<div class="url-box">
  <h2>⚡ AMAZON URL → AUTO FILL</h2>
  <div class="url-row">
    <input type="url" id="amazonUrl" placeholder="https://www.amazon.com/dp/...">
    <button id="fetchBtn" onclick="fetchAmazon()">자동 입력</button>
  </div>
  <p class="fetch-status" id="fetchStatus"></p>
</div>

<p class="section-title">Current Products</p>
<div class="product-list" id="productList">
  <div class="empty">Loading...</div>
</div>

<div class="add-box" id="formBox">
  <h2 id="formTitle">ADD PRODUCT</h2>
  <div class="form-grid">
    <div class="form-group full">
      <label>Product Title</label>
      <input type="text" id="f_title" placeholder="Product name">
    </div>
    <div class="form-group full">
      <label>Amazon Affiliate URL</label>
      <input type="url" id="f_url" placeholder="https://amzn.to/xxxxx">
    </div>
    <div class="form-group full">
      <label>Image URL</label>
      <input type="url" id="f_img" placeholder="https://m.media-amazon.com/..." oninput="previewImg()">
      <img id="imgPreview" class="preview-img" style="display:none">
    </div>
    <div class="form-group">
      <label>Category</label>
      <input type="text" id="f_cat" placeholder="Tech / Beauty / Home...">
    </div>
    <div class="form-group">
      <label>Tag (optional)</label>
      <input type="text" id="f_tag" placeholder="Best Seller / I Own This...">
    </div>
    <div class="form-group">
      <label>Rating</label>
      <input type="number" id="f_rating" placeholder="4.8" min="0" max="5" step="0.1">
    </div>
    <div class="form-group">
      <label>Review Count</label>
      <input type="number" id="f_reviews" placeholder="1234">
    </div>
    <div class="form-group full">
      <label>Description</label>
      <textarea id="f_desc" placeholder="Why you recommend it"></textarea>
    </div>
  </div>
  <div class="btn-row">
    <button class="btn-add" id="submitBtn" onclick="submitProduct()">ADD PRODUCT</button>
    <button class="btn-cancel" id="cancelBtn" onclick="cancelEdit()" style="display:none">CANCEL</button>
  </div>
</div>

<button class="deploy-btn" id="deployBtn" onclick="deploy()">🚀 Save & Deploy</button>
<div class="toast" id="toast"></div>

<script>
  const GITHUB_USER = 'jnamazonusa';
  const GITHUB_REPO = 'Viral_Living_Picks';
  const FILE_PATH   = 'products.json';
  const PROXY       = 'https://api.allorigins.win/get?url=';

  let products = [], siteConfig = {}, fileSha = '';
  let editingIndex = -1;

  function getToken() { return localStorage.getItem('gh_token') || ''; }

  function saveToken() {
    const t = document.getElementById('tokenInput').value.trim();
    if (!t) return showToast('토큰을 입력해주세요', true);
    localStorage.setItem('gh_token', t);
    showToast('Token saved!');
    loadProducts();
  }

  async function loadProducts() {
    const token = getToken();
    if (!token) { document.getElementById('productList').innerHTML = '<div class="empty">토큰을 먼저 입력하세요</div>'; return; }
    try {
      const res = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${FILE_PATH}`, {
        headers: { Authorization: `token ${token}` }
      });
      if (!res.ok) throw new Error();
      const data = await res.json();
      fileSha = data.sha;
      const json = JSON.parse(atob(data.content.replace(/\n/g, '')));
      products = json.products;
      siteConfig = json.site;
      renderList();
    } catch(e) {
      document.getElementById('productList').innerHTML = '<div class="empty">불러오기 실패 — 토큰을 확인하세요</div>';
    }
  }

  function renderList() {
    const el = document.getElementById('productList');
    if (!products.length) { el.innerHTML = '<div class="empty">No products yet</div>'; return; }
    el.innerHTML = products.map((p, i) => `
      <div class="product-item">
        <img src="${p.image_url}" onerror="this.style.display='none'">
        <div class="product-info">
          <div class="title">${p.title}</div>
          <div class="meta">${p.category} · ★${p.rating} · ${p.tag || ''}</div>
        </div>
        <div class="product-actions">
          <button class="btn-edit" onclick="editProduct(${i})">수정</button>
          <button class="btn-delete" onclick="deleteProduct(${i})">✕</button>
        </div>
      </div>`).join('');
  }

  function editProduct(i) {
    const p = products[i];
    editingIndex = i;

    document.getElementById('f_title').value   = p.title || '';
    document.getElementById('f_url').value     = p.affiliate_url || '';
    document.getElementById('f_img').value     = p.image_url || '';
    document.getElementById('f_cat').value     = p.category || '';
    document.getElementById('f_tag').value     = p.tag || '';
    document.getElementById('f_rating').value  = p.rating || '';
    document.getElementById('f_reviews').value = p.review_count || '';
    document.getElementById('f_desc').value    = p.description || '';

    const preview = document.getElementById('imgPreview');
    if (p.image_url) { preview.src = p.image_url; preview.style.display = 'block'; }

    document.getElementById('formTitle').textContent = '✏ EDIT PRODUCT';
    document.getElementById('submitBtn').textContent = 'SAVE CHANGES';
    document.getElementById('cancelBtn').style.display = 'block';
    document.getElementById('formBox').classList.add('editing');

    document.getElementById('formBox').scrollIntoView({ behavior: 'smooth' });
  }

  function cancelEdit() {
    editingIndex = -1;
    clearForm();
    document.getElementById('formTitle').textContent = 'ADD PRODUCT';
    document.getElementById('submitBtn').textContent = 'ADD PRODUCT';
    document.getElementById('cancelBtn').style.display = 'none';
    document.getElementById('formBox').classList.remove('editing');
  }

  function submitProduct() {
    const title   = document.getElementById('f_title').value.trim();
    const url     = document.getElementById('f_url').value.trim();
    const img     = document.getElementById('f_img').value.trim();
    const cat     = document.getElementById('f_cat').value.trim();
    const tag     = document.getElementById('f_tag').value.trim();
    const rating  = parseFloat(document.getElementById('f_rating').value) || 4.5;
    const reviews = parseInt(document.getElementById('f_reviews').value) || 0;
    const desc    = document.getElementById('f_desc').value.trim();

    if (!title || !url) return showToast('제목과 URL은 필수예요', true);

    const product = { 
      id: editingIndex >= 0 ? products[editingIndex].id : 'p' + Date.now(),
      title, category: cat || 'General', rating, review_count: reviews, tag, affiliate_url: url, image_url: img, description: desc 
    };

    if (editingIndex >= 0) {
      products[editingIndex] = product;
      showToast('수정됐어요! Deploy 눌러서 저장하세요');
    } else {
      products.push(product);
      showToast('추가됐어요! Deploy 눌러서 저장하세요');
    }

    renderList();
    cancelEdit();
  }

  function deleteProduct(i) {
    if (!confirm(`"${products[i].title}" 삭제할까요?`)) return;
    products.splice(i, 1);
    renderList();
    showToast('삭제됐어요!');
  }

  function clearForm() {
    ['f_title','f_url','f_img','f_cat','f_tag','f_rating','f_reviews','f_desc','amazonUrl'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('imgPreview').style.display = 'none';
    document.getElementById('fetchStatus').textContent = '';
  }

  function previewImg() {
    const url = document.getElementById('f_img').value;
    const preview = document.getElementById('imgPreview');
    if (url) { preview.src = url; preview.style.display = 'block'; }
    else { preview.style.display = 'none'; }
  }

  async function fetchAmazon() {
    const url = document.getElementById('amazonUrl').value.trim();
    if (!url) return showToast('URL을 입력해주세요', true);
    const btn = document.getElementById('fetchBtn');
    const status = document.getElementById('fetchStatus');
    btn.disabled = true; btn.textContent = '불러오는 중...';
    status.textContent = '아마존 페이지 분석 중...';
    try {
      const res = await fetch(PROXY + encodeURIComponent(url));
      const data = await res.json();
      const doc = new DOMParser().parseFromString(data.contents, 'text/html');
      const titleEl = doc.querySelector('#productTitle');
      const title = titleEl ? titleEl.textContent.trim() : '';
      const ratingEl = doc.querySelector('.a-icon-star .a-icon-alt');
      let rating = 4.5;
      if (ratingEl) { const m = ratingEl.textContent.match(/[\d.]+/); if (m) rating = parseFloat(m[0]); }
      const reviewEl = doc.querySelector('#acrCustomerReviewText');
      let reviews = 0;
      if (reviewEl) { const m = reviewEl.textContent.replace(/,/g, '').match(/\d+/); if (m) reviews = parseInt(m[0]); }
      const imgEl = doc.querySelector('#landingImage');
      let imgUrl = imgEl ? (imgEl.getAttribute('data-old-hires') || imgEl.getAttribute('src') || '') : '';
      if (title) setField('f_title', title);
      if (rating) setField('f_rating', rating);
      if (reviews) setField('f_reviews', reviews);
      if (imgUrl) { setField('f_img', imgUrl); document.getElementById('imgPreview').src = imgUrl; document.getElementById('imgPreview').style.display = 'block'; }
      setField('f_url', url);
      status.textContent = title ? '✅ 자동 입력됐어요! 나머지는 직접 입력해주세요' : '⚠️ 일부만 가져왔어요';
    } catch(e) {
      status.textContent = '⚠️ 자동 입력 실패 — 직접 입력해주세요';
      setField('f_url', url);
    } finally {
      btn.disabled = false; btn.textContent = '자동 입력';
    }
  }

  function setField(id, value) {
    const el = document.getElementById(id);
    el.value = value;
    el.classList.add('auto-filled');
    setTimeout(() => el.classList.remove('auto-filled'), 2000);
  }

  async function deploy() {
    const token = getToken();
    if (!token) return showToast('토큰을 먼저 입력하세요', true);
    const btn = document.getElementById('deployBtn');
    btn.disabled = true; btn.textContent = '⏳ Deploying...';
    const json = JSON.stringify({ site: siteConfig, products }, null, 2);
    const encoded = btoa(unescape(encodeURIComponent(json)));
    try {
      const res = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${FILE_PATH}`, {
        method: 'PUT',
        headers: { Authorization: `token ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: 'Update products via admin', content: encoded, sha: fileSha })
      });
      if (!res.ok) throw new Error();
      const data = await res.json();
      fileSha = data.content.sha;
      showToast('✅ 배포 완료! 1~2분 후 사이트 반영');
    } catch(e) {
      showToast('배포 실패 — 토큰 확인하세요', true);
    } finally {
      btn.disabled = false; btn.textContent = '🚀 Save & Deploy';
    }
  }

  function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show' + (isError ? ' error' : '');
    setTimeout(() => t.className = 'toast', 3000);
  }

  window.onload = () => {
    const token = getToken();
    if (token) { document.getElementById('tokenInput').value = '••••••••••••••••'; loadProducts(); }
  };
</script>
</body>
</html>
